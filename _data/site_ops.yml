# Site operations toggles
adsense:
  enabled: true
  client: ca-pub-2402437399062384
  stitch_routes: true
  defer_until_idle: true
  slots:
    in_article: "6874018777"
    post_footer: "8047040393"
    sidebar: "9362724975"
    mid_article: "6813985623"
    home_bridge: "5343588914"
    in_feed: "9226993605"
  placements:
    in_article: true
    post_footer: true
    sidebar: true
    mid_article: true
    home_bridge: true
    in_feed: true
  # Balanced density (T26f): mobile post 2 (in-article+footer); desktop 2–3 (XOR mid/in-article + footer + sidebar ≥1500px)
  ad_density:
    mobile_post: 2
    desktop_post: 2
    desktop_post_wide: 3
  placements_mobile:
    mid_article: false
    in_feed: false
  mid_article_min_reading_time: 5
  mid_article_priority_slugs:
    - music-player-english
    - convertidor-english
    - optimation-consumer-english
    - automation-sending
  mid_article_priority_min_reading_time: 4
  in_feed_interval: 10
  # Compact horizontal bar width (rem) — centered strip, less visual noise
  horizontal_max_rem:
    mobile: 20
    desktop: 30
  # Manual units only — disable Auto ads overlays (anchor ↑↓, vignette full-page) via loader push
  suppress_auto_overlays: true
  min_heights:
    mobile: 280
    desktop: 250
    footer:
      mobile: 50
      desktop: 60
    sidebar:
      desktop: 250
    home:
      mobile: 50
      desktop: 60
    in_feed:
      mobile: 50
      desktop: 60
  note: >
    Fase 1–4: in_article 6874018777, footer 8047040393, sidebar 9362724975,
    mid 6813985623, home 5343588914, in_feed 9226993605.
    Slot map (API 2026-06-27): 6874018777=en article, 8047040393=horizontal ad,
    9362724975=Post sidebar 300x250, 6813985623=Post mid-article native,
    5343588914=Home bridge horizontal, 9226993605=Intelligence feed horizontal.
    Legacy units still ACTIVE: 1778404697=bloque, 1836855266=articulo — archive in dashboard (T26b).
    Display names target: site-in-article, site-post-footer, etc. → docs/T26_ADSENSE_MANUAL.md

