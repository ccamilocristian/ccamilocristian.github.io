name: Build and deploy Jekyll site to Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify Jekyll 4 (not github-pages gem)
        run: |
          bundle exec jekyll -v
          bundle exec jekyll -v | grep -E 'jekyll 4\.' || (echo "::error::Wrong Jekyll version — expected 4.x from Gemfile.lock" && exit 1)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build site (Bundler + Jekyll 4)
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
