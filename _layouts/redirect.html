---
# jekyll-redirect-from — minimal redirect with GTM for legacy URL measurement
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting&hellip;</title>
  <link rel="canonical" href="{{ page.redirect.to | absolute_url }}">
  {% if jekyll.environment == 'production' %}
    {% include gtm-head.html %}
  {% endif %}
  <script>location="{{ page.redirect.to | absolute_url | xml_escape }}"</script>
  <meta http-equiv="refresh" content="0; url={{ page.redirect.to | absolute_url | xml_escape }}">
  <meta name="robots" content="noindex">
</head>
<body>
  {% if jekyll.environment == 'production' %}
    {% include gtm-noscript.html %}
  {% endif %}
  <h1>Redirecting&hellip;</h1>
  <p><a href="{{ page.redirect.to | absolute_url }}">Continue</a></p>
</body>
</html>
