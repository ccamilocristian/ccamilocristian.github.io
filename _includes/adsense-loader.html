{% assign ads = site.data.site_ops.adsense %}
{% if ads.enabled and ads.client %}
<script defer>
(function () {
  var client = '{{ ads.client }}';
  var loading = false;

  function loadAdSense() {
    if (loading || document.querySelector('script[data-adsense-loader]')) return;
    loading = true;
    window.adsbygoogle = window.adsbygoogle || [];
    /* Manual placements only — no anchor (sticky ↑↓) or vignette (full-page) Auto ads */
    window.adsbygoogle.push({
      google_ad_client: client,
      enable_page_level_ads: false,
      overlays: { bottom: false, top: false, vignette: false }
    });
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + client;
    s.setAttribute('data-adsense-loader', '1');
    s.setAttribute('crossorigin', 'anonymous');
    document.head.appendChild(s);

    if ({{ ads.suppress_auto_overlays | default: true }}) {
      var anchorSel = [
        'ins.adsbygoogle[data-ad-format="anchor"]',
        'ins[data-anchor-status]',
        '.as_ads_anchor',
        '#google_bottom_anchor',
        '#google_top_anchor',
        '[id*="aswift"][id*="anchor"]'
      ].join(',');

      function stripAnchorOverlays() {
        document.querySelectorAll(anchorSel).forEach(function (node) {
          var root = node.closest('.as_ads_anchor') || node;
          if (root && root.parentNode) root.parentNode.removeChild(root);
        });
        document.querySelectorAll('ins.adsbygoogle[data-vignette-loaded]').forEach(function (node) {
          if (node.parentNode) node.parentNode.removeChild(node);
        });
      }

      var stripTimer;
      function scheduleStrip() {
        if (stripTimer) return;
        stripTimer = window.setTimeout(function () {
          stripTimer = 0;
          stripAnchorOverlays();
        }, 120);
      }

      stripAnchorOverlays();
      if (window.MutationObserver) {
        new MutationObserver(scheduleStrip).observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      }
    }
  }

  function scheduleLoad() {
    loadAdSense();
  }

  function detailHasAdsConsent(detail) {
    if (!detail || !detail.categories) return false;
    return !!detail.categories.advertisement;
  }

  function onConsentEvent(e) {
    if (detailHasAdsConsent(e.detail)) scheduleLoad();
    if (window.siteConsentGate && window.siteConsentGate.sync) window.siteConsentGate.sync();
  }

  document.addEventListener('cookieyes_banner_load', onConsentEvent);
  document.addEventListener('cookieyes_consent_update', onConsentEvent);

  function start() {
    function tryGate() {
      if (window.siteConsentGate) {
        window.siteConsentGate.on('advertisement', scheduleLoad);
        return;
      }
      if (document.documentElement.getAttribute('data-cmp-active') === 'true') {
        setTimeout(tryGate, 50);
        return;
      }
      scheduleLoad();
    }
    tryGate();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
{% endif %}
