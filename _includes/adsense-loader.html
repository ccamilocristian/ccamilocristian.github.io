{% assign ads = site.data.site_ops.adsense %}
{% if ads.enabled and ads.client %}
<script defer>
(function () {
  var client = '{{ ads.client }}';
  var loading = false;

  function loadAdSense() {
    if (loading || document.querySelector('script[data-adsense-loader]')) return;
    loading = true;
    window.adsbygoogle = window.adsbygoogle || [];
    /* Manual placements only — no anchor (sticky ↑↓) or vignette (full-page) Auto ads */
    window.adsbygoogle.push({
      google_ad_client: client,
      enable_page_level_ads: false,
      overlays: { bottom: false, top: false, vignette: false }
    });
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + client;
    s.setAttribute('data-adsense-loader', '1');
    document.head.appendChild(s);
  }

  function scheduleLoad() {
    loadAdSense();
  }

  function detailHasAdsConsent(detail) {
    if (!detail || !detail.categories) return false;
    return !!detail.categories.advertisement;
  }

  function onConsentEvent(e) {
    if (detailHasAdsConsent(e.detail)) scheduleLoad();
    if (window.siteConsentGate && window.siteConsentGate.sync) window.siteConsentGate.sync();
  }

  document.addEventListener('cookieyes_banner_load', onConsentEvent);
  document.addEventListener('cookieyes_consent_update', onConsentEvent);

  function start() {
    function tryGate() {
      if (window.siteConsentGate) {
        window.siteConsentGate.on('advertisement', scheduleLoad);
        return;
      }
      if (document.documentElement.getAttribute('data-cmp-active') === 'true') {
        setTimeout(tryGate, 50);
        return;
      }
      scheduleLoad();
    }
    tryGate();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
{% endif %}
