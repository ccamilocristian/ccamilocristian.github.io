<!--
  Microsoft Clarity — project ID from _data/site_ops.yml
  Loads only after analytics consent when CMP is active.
-->
{% assign clarity = site.data.site_ops.clarity %}
{% if clarity.enabled and clarity.project_id %}
<script defer>
(function () {
  function loadClarity() {
    if (window.__clarityLoaded) return;
    window.__clarityLoaded = true;
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "{{ clarity.project_id }}");
  }
  function start() {
    function tryGate() {
      if (window.siteConsentGate) {
        window.siteConsentGate.on('analytics', loadClarity);
        return;
      }
      if (document.documentElement.getAttribute('data-cmp-active') === 'true') {
        setTimeout(tryGate, 50);
        return;
      }
      loadClarity();
    }
    tryGate();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
{% endif %}
