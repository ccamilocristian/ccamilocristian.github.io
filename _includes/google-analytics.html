<!--
  GA4 (gtag.js) — ID from _config.yml
-->
{% assign ga_id = site.google_analytics.id %}
{% if ga_id and ga_id != '' %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script defer>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ ga_id }}', {
    send_page_view: true,
    anonymize_ip: true
  });
</script>
{% endif %}
